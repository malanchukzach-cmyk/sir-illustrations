<!DOCTYPE html>
<html>

<head>
<title>SIR Illustrations</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f0f14;
color:white;
}

header{
background:#ff3b6b;
padding:25px;
text-align:center;
font-size:32px;
}

.search{
text-align:center;
padding:20px;
}

input{
padding:10px;
width:250px;
border-radius:6px;
border:none;
}

.shop{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:#1a1a22;
width:220px;
margin:12px;
padding:12px;
border-radius:10px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:8px;
}

.price{
color:#00ffa6;
font-size:18px;
margin:10px;
}

button{
background:#ff3b6b;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.cart{
position:fixed;
right:0;
top:0;
width:250px;
height:100%;
background:#15151c;
padding:20px;
overflow:auto;
}

</style>

</head>

<body>

<header>
SIR Illustrations
</header>

<div class="search">
<input type="text" id="search" placeholder="Search Pokémon..." onkeyup="searchCards()">
</div>

<div class="shop" id="shop">

<div class="card">
<img src="https://images.pokemontcg.io/sv4pt5/234.png">
<h3>Mewtwo SIR</h3>
<div class="price">$120</div>
<button onclick="addToCart('Mewtwo SIR',120)">Add</button>
</div>

<div class="card">
<img src="https://images.pokemontcg.io/sv3/203.png">
<h3>Gardevoir IR</h3>
<div class="price">$40</div>
<button onclick="addToCart('Gardevoir IR',40)">Add</button>
</div>

<div class="card">
<img src="https://images.pokemontcg.io/sv2/205.png">
<h3>Dendra SIR</h3>
<div class="price">$65</div>
<button onclick="addToCart('Dendra SIR',65)">Add</button>
</div>

</div>

<div class="cart">

<h2>Cart</h2>

<div id="cart-items"></div>

<h3>Total: $<span id="total">0</span></h3>

</div>

<script>

let total = 0;

function addToCart(name,price){

let item=document.createElement("div")

item.innerText=name+" - $"+price

document.getElementById("cart-items").appendChild(item)

total += price

document.getElementById("total").innerText=total

}

function searchCards(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let text=card.innerText.toLowerCase()

card.style.display=text.includes(input)?"block":"none"

})

}

</script>

</body>

</html>
